<!DOCTYPE html>
<html>
    <head>
        <style>
            .border{
                border-style:solid;
                margin-top: 200px;
                margin-left: 500px;
                margin-right: 500px;
                box-shadow: 2px 2px 5px black;
                background-color: aliceblue;
                
                
            }
            .form{
                text-align: center;
            }
            h1{
                
                text-align: center;
                border-bottom-style: solid;
            }
        </style>
    </head>
    <body style="background-color: aqua;">
        
        <div class="border">
            <h1>
                Student Registration Form
            </h1>
            <div class="form">
            <table>
                <tr>
                    <td>
                        Name :<input type="text" placeholder="Enter your Name">
                    </td>
                    <td>DOB: <input type="date"></td>
                </tr>
                <tr>
                    <td>Phone No:<input type="text" placeholder="Enter Phone no"></td>
                    <td><input type="radio">Male<input type="radio">Female</td>
                </tr>
                <tr>
                    <td>Email: <input type="email" placeholder="Enter email"></td>
                     <td> Stream:
                        <select>
                        <option selected>Select Stream</option>
                        <option>Engineering</option>
                        <option>Medical</option>
                        <option>Arts</option>
                        <option>Business</option>
                        </select></td>
                    </tr>
                    <tr>
                        <td><input type="button" value="Submit"></td>
                    </tr>
            </table>
            
            </div>
        </div>
    </body>
</html>
